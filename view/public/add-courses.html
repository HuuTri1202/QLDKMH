<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thêm môn học</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">
  <h2>📚 Thêm môn học</h2>

  <form id="form" class="form-card">
    <input placeholder="Mã môn" id="code" required>
    <input placeholder="Tên môn" id="name" required>
    <input placeholder="Giảng viên" id="teacher" required>

    <select id="type">
      <option>Lý thuyết</option>
      <option>Thực hành</option>
      <option>Lý thuyết + Thực hành</option>
    </select>

    <input type="number" id="capacity" placeholder="Sức chứa" required>

    <h4>📅 Lịch học</h4>
    <div id="schedule-container"></div>

    <button type="submit">Tạo môn học</button>
  </form>
</div>

<script src="../js/add-courses.js"></script>
</body>
</html>
